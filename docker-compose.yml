version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: api-dashboard-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: api_usage_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard_local
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d api_usage_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    container_name: api-usage-dashboard
    ports:
      - "127.0.0.1:8050:8050"
    volumes:
      - ~/.openclaw:/root/.openclaw:ro
    environment:
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - DATABASE_URL=postgresql://dashboard:dashboard_local@postgres:5432/api_usage_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Prometheus + Grafana stack (enable with --profile full)
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - full
    container_name: api-dashboard-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles:
      - full
    container_name: api-dashboard-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
